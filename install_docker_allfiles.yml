---
# Playbook: Setup Docker Compose stack with Traefik, Grafana, Prometheus, etc.
# Public version - replace placeholders and adjust paths/domains before use.
# Note: This playbook assumes you have already created necessary directories and files.
# yourdomain.example should be replaced with your actual domain.

- name: Copy docker-compose.yml for Traefik, Grafana, Prometheus, and other services
  copy:
    dest: /opt/ansible-lab-env/docker-compose.yml
    mode: "0644"
    content: |
      version: "3.8"

      services:
        reverse-proxy:
          image: traefik:latest
          container_name: traefik
          command:
            - --api.dashboard=true
            - --api.debug=true
            - --log.level=DEBUG
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --entryPoints.web.address=:80
            - --entryPoints.websecure.address=:443
            # REPLACE with your email for Let's Encrypt registration
            - --certificatesResolvers.letsencrypt.acme.email=youremail@example.com
            - --certificatesResolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
            - --certificatesResolvers.letsencrypt.acme.httpChallenge.entryPoint=web
            - --entrypoints.web.http.redirections.entrypoint.to=websecure
            - --entryPoints.web.http.redirections.entrypoint.scheme=https
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ./letsencrypt:/letsencrypt
          networks:
            - traefik_net
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.traefik.rule=Host(`yourdomain.example`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
            - "traefik.http.routers.traefik.entrypoints=websecure"
            - "traefik.http.routers.traefik.tls=true"
            - "traefik.http.routers.traefik.tls.certresolver=letsencrypt"
            - "traefik.http.routers.traefik.service=api@internal"
            - "traefik.http.middlewares.authelia-auth.forwardauth.address=http://authelia:9091/api/verify?rd=https://yourdomain.example/sso"
            - "traefik.http.middlewares.authelia-auth.forwardauth.trustForwardHeader=true"
            - "traefik.http.middlewares.authelia-auth.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email"
            - "traefik.http.routers.traefik.middlewares=authelia-auth"

        authelia:
          image: authelia/authelia:latest
          container_name: authelia
          volumes:
            - /opt/ansible-lab-env/authelia:/config
          environment:
            - TZ=Europe/Budapest
          networks:
            - traefik_net
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.authelia.rule=Host(`yourdomain.example`) && PathPrefix(`/sso`)"
            - "traefik.http.routers.authelia.entrypoints=websecure"
            - "traefik.http.routers.authelia.tls=true"
            - "traefik.http.routers.authelia.tls.certresolver=letsencrypt"
            - "traefik.http.services.authelia.loadbalancer.server.port=9091"
            - "traefik.http.routers.authelia.service=authelia"

        whoami:
          image: traefik/whoami
          container_name: simple-service
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.whoami.rule=Host(`yourdomain.example`) && PathPrefix(`/whoami`)"
            - "traefik.http.routers.whoami.entrypoints=websecure"
            - "traefik.http.routers.whoami.tls=true"
            - "traefik.http.routers.whoami.tls.certresolver=letsencrypt"
            - "traefik.http.routers.whoami.middlewares=authelia-auth"
            - "traefik.http.services.whoami.loadbalancer.server.port=80"
          networks:
            - traefik_net

        prometheus:
          image: prom/prometheus:latest
          container_name: prometheus
          user: "472"
          command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --web.external-url=https://yourdomain.example/prometheus
            - --web.route-prefix=/prometheus
          volumes:
            - /var/lib/prometheus:/prometheus
            - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
          networks:
            - traefik_net
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.prometheus.rule=Host(`yourdomain.example`) && PathPrefix(`/prometheus`)"
            - "traefik.http.routers.prometheus.entrypoints=websecure"
            - "traefik.http.routers.prometheus.tls=true"
            - "traefik.http.routers.prometheus.tls.certresolver=letsencrypt"
            - "traefik.http.routers.prometheus.middlewares=authelia-auth"
            - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

        grafana:
          image: grafana/grafana:latest
          container_name: grafana
          user: "472"
          environment:
            - GF_SERVER_ROOT_URL=https://yourdomain.example/grafana/
            - GF_LOG_LEVEL=debug
            - GF_SERVER_SERVE_FROM_SUB_PATH=true
            - GF_AUTH_DISABLE_LOGIN_FORM=true
            - GF_AUTH_PROXY_ENABLED=true
            - GF_AUTH_PROXY_HEADER_NAME=Remote-User
            - GF_AUTH_PROXY_HEADER_PROPERTY=username
            - GF_AUTH_PROXY_AUTO_SIGN_UP=true
            # Adjust whitelist IPs/networks as needed
            - GF_AUTH_PROXY_WHITELIST=127.0.0.1,::1,172.21.0.0/16
          volumes:
            - /var/lib/grafana:/var/lib/grafana
            - ./grafana/dashboards:/var/lib/grafana/dashboards
            - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
          networks:
            - traefik_net
          labels:
            - "traefik.enable=true"
            - "traefik.http.routers.grafana.rule=Host(`yourdomain.example`) && PathPrefix(`/grafana`)"
            - "traefik.http.routers.grafana.entrypoints=websecure"
            - "traefik.http.routers.grafana.tls=true"
            - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
            - "traefik.http.routers.grafana.middlewares=authelia-auth"
            - "traefik.http.services.grafana.loadbalancer.server.port=3000"

        vpsnodeexporter:
          image: prom/node-exporter:latest
          container_name: vpsnodeexporter
          restart: unless-stopped
          network_mode: host
          pid: "host"
          volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
          command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--path.rootfs=/rootfs'
          labels:
            - "traefik.enable=false"

        dockerscrapercadvisor:
          image: gcr.io/cadvisor/cadvisor:latest
          container_name: dockerscrapercadvisor
          restart: unless-stopped
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:rw
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
          networks:
            - traefik_net
          labels:
            - "traefik.enable=false"

      networks:
        traefik_net:
          driver: bridge
          ipam:
            config:
              - subnet: 172.21.0.0/16

- name: Bring down any previously running Compose stack
  shell: docker compose down
  args:
    chdir: /opt/ansible-lab-env

- name: Bring up the Docker Compose stack
  shell: docker compose up -d
  args:
    chdir: /opt/ansible-lab-env
