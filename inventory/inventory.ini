[client]
"your_server_ip_address" ansible_user="sudo_level_user_username" ansible_port=22 ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# WARNING:
# Never store plaintext passwords in inventory files.
# Use ansible-vault to encrypt sensitive data like ansible_ssh_pass.
# Example to create vault file:
#   ansible-vault create group_vars/client.yml
# Put your passwords there and reference them via group_vars or host_vars.
# This keeps your credentials secure and out of public repos.
