---
# Playbook: Install and configure Authelia and Prometheus for ansible-lab-env
# Note: This is a sanitized public version.
# Replace placeholder values with your own secure data before use.

- name: Create Authelia configuration.yml
  copy:
    dest: /opt/ansible-lab-env/authelia/configuration.yml
    mode: "0644"
    content: |
      server:
        # Listen address (change port/path if needed)
        address: tcp://0.0.0.0:9091/sso

      log:
        level: info

      theme: auto

      session:
        name: authelia_session
        # REPLACE "secret" with your own encryption key (32 bytes base64)
        secret: "REPLACE_WITH_YOUR_SECRET_SESSION_KEY"
        expiration: 1h
        inactivity: 5m
        cookies:
          - name: authelia_session
            # Replace with your actual domain
            domain: example.com
            authelia_url: https://example.com/sso
            default_redirection_url: https://example.com/sso

      telemetry:
        metrics:
          enabled: true
          # Port for Prometheus metrics scraping
          address: tcp://0.0.0.0:9959/metrics
          buffers:
            read: 4096
            write: 4096
          timeouts:
            read: '5s'
            write: '5s'
            idle: '30s'

      authentication_backend:
        password_reset:
          disable: true
        file:
          # Path inside the container or host where users_database.yml is located
          path: /config/users_database.yml

      access_control:
        default_policy: deny
        rules:
          - domain: example.com
            resources:
              - "^/sso.*$"
            policy: bypass

          - domain: example.com
            resources:
              - "^/.*$"
            policy: one_factor

      storage:
        # REPLACE "encryption_key" with your own encryption key (32 bytes base64)
        encryption_key: "REPLACE_WITH_BASE64_ENCRYPTION_KEY"
        local:
          path: /config/db.sqlite3

      notifier:
        filesystem:
          filename: /config/notification.txt

- name: Create Authelia users_database.yml
  copy:
    dest: /opt/ansible-lab-env/authelia/users_database.yml
    mode: "0644"
    content: |
      users:
        admin:
          # REPLACE with your own Argon2 hashed password
          password: "$argon2id$EXAMPLE_HASHED_PASSWORD"
          displayname: "Admin"
          email: admin@example.com
          groups:
            - admins
            
        user1:
          # REPLACE with your own Argon2 hashed password
          password: "$argon2id$EXAMPLE_HASHED_PASSWORD"
          displayname: "User One"
          email: user1@example.com
          groups:
            - users

- name: Copy Prometheus config
  copy:
    dest: /opt/ansible-lab-env/prometheus.yml
    mode: "0644"
    content: |
      global:
        scrape_interval: 15s

      scrape_configs:
        - job_name: 'prometheus'
          metrics_path: /prometheus/metrics
          static_configs:
            - targets: ['localhost:9090']

        - job_name: 'vpsnodeexporter'
          static_configs:
            - targets: ['vpsnodeexporter:9100']

        - job_name: 'dockerscrapercadvisor'
          static_configs:
            - targets: ['dockerscrapercadvisor:8080']
               
        - job_name: 'authelia'
          static_configs:
            - targets: ['authelia:9959']
